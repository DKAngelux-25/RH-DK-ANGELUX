<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK Angelux — RH Portail</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ... (Votre CSS reste identique, je ne le change pas) ... */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C9A84C;--gold2:#E8C96A;--gold-dim:rgba(201,168,76,0.15);
  --dark:#0B0E14;--dark2:#13171F;--dark3:#1A1F2B;
  --text:#F0EDE6;--muted:#8A8880;--border:rgba(201,168,76,0.2);
  --red:#C94C4C;--green:#4CAF7E;
}
body{font-family:'Lato',sans-serif;min-height:100vh;background:var(--dark);color:var(--text);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px);background-size:60px 60px;}
.bg-orb{position:absolute;border-radius:50%;}
.orb1{width:500px;height:500px;top:-200px;right:-150px;background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);}
.orb2{width:400px;height:400px;bottom:-200px;left:-100px;background:radial-gradient(circle,rgba(76,175,126,0.06) 0%,transparent 70%);}
.login-wrap{position:relative;z-index:2;width:100%;max-width:440px;padding:20px;}
.brand-top{text-align:center;margin-bottom:36px;}
.brand-emblem{width:72px;height:72px;margin:0 auto 16px;background:linear-gradient(135deg,#1A1F2B,#0B0E14);border:1.5px solid var(--gold);border-radius:16px;display:flex;align-items:center;justify-content:center;position:relative;}
.brand-emblem::after{content:'';position:absolute;inset:4px;border:1px solid rgba(201,168,76,0.3);border-radius:10px;}
.brand-emblem svg{width:36px;height:36px;}
.brand-name{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
.brand-sub{font-size:12px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-top:4px;}
.card{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:36px;box-shadow:0 24px 64px rgba(0,0,0,0.5);}
.card-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:600;margin-bottom:6px;}
.card-desc{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.form-group input{width:100%;background:var(--dark3);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:13px 16px;color:var(--text);font-family:'Lato',sans-serif;font-size:14px;outline:none;transition:all 0.25s;}
.form-group input:focus{border-color:var(--gold);background:rgba(201,168,76,0.05);box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
.form-group input::placeholder{color:rgba(138,136,128,0.5);}
.btn-login{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--gold),#A8872E);color:#0B0E14;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;letter-spacing:0.5px;cursor:pointer;transition:all 0.3s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,0.35);}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:#0B0E14;border-radius:50%;animation:spin 0.8s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:rgba(201,76,76,0.12);border:1px solid rgba(201,76,76,0.3);border-radius:8px;padding:11px 14px;font-size:13px;color:#E08080;margin-bottom:16px;display:none;}
.divider{display:flex;align-items:center;gap:12px;margin:22px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07);}
.divider span{font-size:11px;color:var(--muted);}
.admin-btn{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--gold);font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;}
.admin-btn:hover{background:var(--gold-dim);}
.footer{text-align:center;margin-top:28px;font-size:11px;color:rgba(138,136,128,0.5);letter-spacing:1px;}
.loading-overlay{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.loading-logo{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--gold);letter-spacing:3px;}
.loading-bar{width:200px;height:3px;background:rgba(201,168,76,0.2);border-radius:99px;overflow:hidden;}
.loading-bar-fill{height:100%;width:0%;background:var(--gold);border-radius:99px;animation:loadBar 1.5s ease-out forwards;}
@keyframes loadBar{to{width:100%}}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">DK ANGELUX</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <div style="font-size:12px;color:var(--muted);letter-spacing:2px;">CHARGEMENT...</div>
</div>

<div class="bg-grid"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="login-wrap">
  <div class="brand-top">
    <div class="brand-emblem">
      <svg viewBox="0 0 36 36" fill="none"><polygon points="18,4 30,10 30,26 18,32 6,26 6,10" stroke="#C9A84C" stroke-width="1.5" fill="rgba(201,168,76,0.1)"/><text x="18" y="22" text-anchor="middle" font-family="Outfit" font-size="10" font-weight="800" fill="#C9A84C">DK</text></svg>
    </div>
    <div class="brand-name">DK Angelux</div>
    <div class="brand-sub">Portail RH</div>
  </div>
  <div class="card">
    <div class="card-title">Connexion</div>
    <div class="card-desc">Accédez à votre espace employé avec vos identifiants professionnels.</div>
    <div class="err" id="errMsg">Email ou mot de passe incorrect.</div>
    <div class="form-group">
      <label>Adresse email</label>
      <input type="email" id="email" placeholder="votre@dkangelux.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn-login" id="loginBtn" onclick="login()">
      <span class="spinner" id="loginSpinner"></span>
      <span id="loginText">Se connecter</span>
    </button>
    <div class="divider"><span>ACCÈS ADMINISTRATEUR</span></div>
    <button class="admin-btn" onclick="goAdmin()">🛡 Espace Administrateur RH</button>
  </div>
  <div class="footer">© 2025 DK Angelux — Accès réservé au personnel</div>
</div>

<!-- Firebase SDK corrigé -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDPxpICy5rmjkGFxIa48drLcHiWMrjjcys",
  authDomain: "rh-dk-angelux.firebaseapp.com",
  projectId: "rh-dk-angelux",
  storageBucket: "rh-dk-angelux.firebasestorage.app",
  messagingSenderId: "650294441544",
  appId: "1:650294441544:web:32dbf9e1374072394a8a7d",
  measurementId: "G-5B85ECTW1F"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Masquer loading
setTimeout(()=>{
  document.getElementById('loadingOverlay').style.opacity='0';
  setTimeout(()=>document.getElementById('loadingOverlay').style.display='none',400);
},1500);

window.login = async function() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pwd = document.getElementById('password').value;
  const errDiv = document.getElementById('errMsg');
  const btn = document.getElementById('loginBtn');
  const spinner = document.getElementById('loginSpinner');
  const loginText = document.getElementById('loginText');
  
  errDiv.style.display = 'none';
  btn.disabled = true;
  spinner.style.display = 'block';
  loginText.textContent = 'Vérification...';

  try {
    // CONNEXION VIA FIREBASE AUTH (Sécurisé)
    const userCredential = await signInWithEmailAndPassword(auth, email, pwd);
    const user = userCredential.user;

    // Redirection selon le rôle
    if (user.email === 'admin@dkangelux.com') {
      sessionStorage.setItem('rh_current', 'ADMIN');
      window.location.href = 'admin.html';
    } else {
      // Pour les employés, on récupère leurs données dans Firestore
      const q = query(collection(db, 'users'), where('email', '==', email));
      const snap = await getDocs(q);
      
      if (!snap.empty) {
        const userData = snap.docs[0].data();
        sessionStorage.setItem('rh_current', snap.docs[0].id);
        sessionStorage.setItem('rh_user_cache', JSON.stringify({id: snap.docs[0].id, ...userData}));
      }
      window.location.href = 'employee.html';
    }

  } catch(e) {
    console.error(e);
    errDiv.textContent = 'Email ou mot de passe incorrect (Firebase).';
    errDiv.style.display = 'block';
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    loginText.textContent = 'Se connecter';
  }
};

window.goAdmin = function() { window.location.href = 'admin.html'; };
document.addEventListener('keydown', e => { if(e.key === 'Enter') window.login(); });
</script>
</body>
</html>
