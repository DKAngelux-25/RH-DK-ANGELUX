<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RH Portail — Connexion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
    background: linear-gradient(135deg,#0a1628 0%,#0d2240 40%,#0f3460 100%);
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }
  body::before{
    content:'';position:absolute;width:600px;height:600px;
    border-radius:50%;background:rgba(29,158,117,0.08);
    top:-200px;right:-200px;
  }
  body::after{
    content:'';position:absolute;width:400px;height:400px;
    border-radius:50%;background:rgba(55,138,221,0.07);
    bottom:-150px;left:-150px;
  }
  .card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:24px;padding:48px 40px;
    width:100%;max-width:420px;
    position:relative;z-index:2;
  }
  .logo{
    display:flex;align-items:center;gap:12px;
    justify-content:center;margin-bottom:32px;
  }
  .logo-icon{
    width:52px;height:52px;border-radius:14px;
    background:linear-gradient(135deg,#1D9E75,#0F6E56);
    display:flex;align-items:center;justify-content:center;
    font-size:24px;
  }
  .logo-text{
    font-family:'Sora',sans-serif;
  }
  .logo-text h1{
    font-size:22px;font-weight:700;color:#fff;line-height:1;
  }
  .logo-text span{
    font-size:12px;color:rgba(255,255,255,0.5);font-weight:300;
    letter-spacing:2px;text-transform:uppercase;
  }
  .subtitle{
    text-align:center;color:rgba(255,255,255,0.55);
    font-size:14px;margin-bottom:32px;line-height:1.6;
  }
  .form-group{margin-bottom:18px;}
  label{
    display:block;font-size:12px;font-weight:500;
    color:rgba(255,255,255,0.6);margin-bottom:8px;
    letter-spacing:0.5px;text-transform:uppercase;
  }
  input[type=email],input[type=password]{
    width:100%;background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:12px;padding:14px 16px;
    color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;
    transition:all 0.3s;outline:none;
  }
  input:focus{
    border-color:rgba(29,158,117,0.7);
    background:rgba(29,158,117,0.07);
    box-shadow:0 0 0 3px rgba(29,158,117,0.15);
  }
  input::placeholder{color:rgba(255,255,255,0.3);}
  .btn{
    width:100%;padding:15px;border:none;
    border-radius:12px;cursor:pointer;
    font-family:'Sora',sans-serif;font-size:15px;font-weight:600;
    transition:all 0.3s;margin-top:8px;
  }
  .btn-primary{
    background:linear-gradient(135deg,#1D9E75,#0F6E56);
    color:#fff;letter-spacing:0.5px;
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(29,158,117,0.4);}
  .btn-primary:active{transform:translateY(0);}
  .error{
    background:rgba(216,90,48,0.15);border:1px solid rgba(216,90,48,0.4);
    border-radius:10px;padding:12px 16px;
    color:#F0997B;font-size:13px;margin-bottom:16px;display:none;
  }
  .divider{
    display:flex;align-items:center;gap:12px;
    margin:20px 0;
  }
  .divider::before,.divider::after{
    content:'';flex:1;height:1px;
    background:rgba(255,255,255,0.1);
  }
  .divider span{font-size:12px;color:rgba(255,255,255,0.35);}
  .admin-link{
    text-align:center;margin-top:16px;
  }
  .admin-link a{
    color:rgba(55,138,221,0.8);font-size:13px;
    text-decoration:none;transition:color 0.2s;
  }
  .admin-link a:hover{color:#378ADD;}
  .footer-note{
    text-align:center;margin-top:24px;
    color:rgba(255,255,255,0.25);font-size:11px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">👔</div>
    <div class="logo-text">
      <h1>RH Portail</h1>
      <span>Espace Employé</span>
    </div>
  </div>
  <p class="subtitle">Connectez-vous avec votre adresse email<br>professionnelle et votre mot de passe.</p>
  <div class="error" id="errMsg">Email ou mot de passe incorrect.</div>
  <div class="form-group">
    <label>Adresse email</label>
    <input type="email" id="email" placeholder="votre@email.com">
  </div>
  <div class="form-group">
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <button class="btn btn-primary" onclick="login()">Se connecter →</button>
  <div class="divider"><span>ou</span></div>
  <div class="admin-link">
    <a href="admin.html">🛡️ Accès Administrateur RH</a>
  </div>
  <p class="footer-note">© 2025 RH Portail — Accès réservé au personnel</p>
</div>

<script>
// --- Initialisation des données par défaut ---
function initData(){
  if(!localStorage.getItem('rh_users')){
    const defaultUsers=[
      {id:'USR001',name:'Marie Dupont',email:'marie@entreprise.com',password:'marie123',role:'employee',poste:'Comptable',avatar:'MD',congesRestants:30,congesPris:0},
      {id:'USR002',name:'Jean Martin',email:'jean@entreprise.com',password:'jean123',role:'employee',poste:'Commercial',avatar:'JM',congesRestants:30,congesPris:0},
      {id:'USR003',name:'Sophie Léa',email:'sophie@entreprise.com',password:'sophie123',role:'employee',poste:'RH Assistant',avatar:'SL',congesRestants:30,congesPris:0}
    ];
    localStorage.setItem('rh_users',JSON.stringify(defaultUsers));
  }
  if(!localStorage.getItem('rh_admin')){
    const admin={email:'admin@entreprise.com',password:'admin2025',name:'Directeur RH'};
    localStorage.setItem('rh_admin',JSON.stringify(admin));
  }
  if(!localStorage.getItem('rh_pointages')) localStorage.setItem('rh_pointages',JSON.stringify([]));
  if(!localStorage.getItem('rh_conges')) localStorage.setItem('rh_conges',JSON.stringify([]));
  if(!localStorage.getItem('rh_performances')) localStorage.setItem('rh_performances',JSON.stringify([]));
}

function login(){
  const email=document.getElementById('email').value.trim();
  const pwd=document.getElementById('password').value;
  const errDiv=document.getElementById('errMsg');
  errDiv.style.display='none';

  // Vérifier admin
  const admin=JSON.parse(localStorage.getItem('rh_admin')||'{}');
  if(email===admin.email && pwd===admin.password){
    sessionStorage.setItem('rh_current','ADMIN');
    window.location.href='admin.html';return;
  }

  // Vérifier employés
  const users=JSON.parse(localStorage.getItem('rh_users')||'[]');
  const user=users.find(u=>u.email===email && u.password===pwd);
  if(user){
    sessionStorage.setItem('rh_current',user.id);
    window.location.href='employee.html';return;
  }

  errDiv.style.display='block';
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
initData();
</script>
</body>
</html>
